<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Nhu | Get in Touch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .contact-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1); border-color: #4338ca; }
        .btn-send { background: #4338ca; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-send:hover { background: #3730a3; transform: scale(1.02); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">NHU.LAM</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">About Me</a>
                <a class="nav-link" href="travel.html">My Travels</a>
                <a class="nav-link active" href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="contact-card">
                    <h2 class="text-center mb-4">Send Me a Message</h2>
                    <form action="#" method="post">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="Enter your name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="5" placeholder="How can I help you?"></textarea>
                        </div>
                        <button type="submit" class="btn-send w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
